<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="tracker.css">
        <title>Financial Planner - Savings Tracker</title>
    </head>

    <body>
        <div class="nav-container">
            <span class="user-email" id="user-display-email"></span>
            <div class="nav-tabs">
            <a href="index.html" class="tab-btn">Budget Planner</a>
            <a href="history.html" class="tab-btn">Saved History</a> 
            <a href="tracker.html" class="tab-btn active">Savings Tracker</a>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
        </div>

        <div class="container">
            <div id="tab-savings" class="tab-content">
                <div class="header">
                    <h1>Target Savings Tracker</h1>
                    <p>Define your goals, log your progress, and watch your savings grow.</p>
                </div>

                <div class="form-box">
                    <h2 class="section-title" style="margin-top:0;">Create New Savings Goal</h2>
                    
                    <div class="form-group">
                        <label>Goal Name</label>
                        <input type="text" id="goal-name" placeholder="e.g. Emergency Fund, House Deposit, New Laptop" />
                    </div>
                    
                    <div class="form-grid tracker-form-grid">
                        <div class="form-group">
                            <label>Target Amount</label>
                            <input type="number" id="goal-target" placeholder="e.g. 5000" />
                        </div>
                        <div class="form-group">
                            <label>Current Savings</label>
                            <input type="number" id="goal-current" placeholder="e.g. 500" value="0" />
                        </div>
                    </div>

                    <button class="submit-btn" onclick="createNewGoal()">+ Create Savings Goal</button>
                </div>

                <h2 class="section-title">Your Active Goals</h2>
                <div id="goals-list-container" class="cards-grid">
                </div>
                
            </div> 
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="tracker.js"></script>
    </body>
</html>
